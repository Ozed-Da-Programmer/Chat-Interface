<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Interface</title>
    <style>
        body {
            font-family: Calibri, sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .chat-container {
            max-width: 700px;
            margin: auto;
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .chat-history {
            height: 350px;
            border: 1px solid #ccc;
            padding: 10px;
            overflow-y: auto;
            margin-bottom: 10px;
            background: #f9f9f9;
        }

        .message {
            max-width: 60%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 15px;
            font-size: 14px;
        }

        .user-message {
            background: green;
            color: white;
            margin-left: auto;
        }

        form {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            font-size: 14px;
        }

        button {
            padding: 10px 15px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>WEEK 3 ASSIGNMENT: Chat Interface</h1>

    <div class="chat-container">
        <div class="chat-history" id="chatHistory">
            <!-- Messages will appear here -->
        </div>

        <form id="chatForm">
            <input type="text" id="messageInput" placeholder="Type a message...">
            <button type="submit">Send</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
